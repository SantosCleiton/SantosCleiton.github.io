<!DOCTYPE html>
<html>
  <head>
    <script src="https://static.safe2pay.dev/scripts/verify_3DS2.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cleave.js@1/dist/cleave.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        background: #f4f6f9;
        flex-direction: column;
      }

      .form-container {
        background: #fff;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0px 4px 10px rgba(0, 0, 0, 0.1);
        width: 400px;
      }

      label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
      }

      input, select {
        width: 100%;
        padding: 8px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 6px;
      }

      #btnSendOrder {
        width: 100%;
        background: #007bff;
        color: #fff;
        padding: 10px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
      }

      #btnSendOrder:disabled {
        background: #ccc;
      }

      .error {
        color: red;
        font-size: 12px;
        display: none;
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        background: #e9f7ef;
        border-radius: 8px;
        width: 400px;
        word-break: break-word;
      }
    </style>
  </head>

  <body>
    <div class="form-container">
      <h2>Exemplo 3DS</h2>

      <label>Valor</label>
      <input type="text" id="txtAmount" placeholder="R$ 0,00" />
      <div id="errorAmount" class="error">Valor inválido</div>

      <label>Nome no cartão</label>
      <input type="text" id="txtCardAlias" />
      <div id="errorAlias" class="error">Informe o nome</div>

      <label>Número do cartão</label>
      <input type="text" id="txtCardNumber" />
      <div id="errorNumber" class="error">Informe o número</div>

      <label>Parcelas</label>
      <select id="drpInstallments">
        <option value="01">1x</option> 
        <option value="02">2x</option> 
        <option value="03">3x</option> 
        <option value="04">4x</option> 
        <option value="05">5x</option> 
        <option value="06">6x</option> 
        <option value="07">7x</option> 
        <option value="08">8x</option> 
        <option value="09">9x</option> 
        <option value="10">10x</option> 
        <option value="11">11x</option> 
        <option value="12">12x</option>
      </select>

      <label>Mês</label>
      <select id="drpCardExpirationMonth">
        <option value="01">Janeiro</option> 
        <option value="02">Fevereiro</option> 
        <option value="03">Março</option> 
        <option value="04">Abril</option> 
        <option value="05">Maio</option> 
        <option value="06">Junho</option> 
        <option value="07">Julho</option> 
        <option value="08">Agosto</option> 
        <option value="09">Setembro</option> 
        <option value="10">Outubro</option> 
        <option value="11">Novembro</option> 
        <option value="12">Dezembro</option>
      </select>

      <label>Ano</label>
      <select id="drpCardExpirationYear">
        <option value="26">2026</option>
        <option value="27">2027</option>
        <option value="28">2028</option>
        <option value="29">2029</option>
        <option value="30">2030</option>
        <option value="31">2031</option>
        <option value="32">2032</option>
        <option value="33">2033</option>
        <option value="34">2034</option>
        <option value="35">2035</option>
        <option value="36">2036</option>
        <option value="37">2037</option>
        <option value="38">2038</option>
        <option value="39">2039</option>
        <option value="40">2040</option>
      </select>

      <input id="btnSendOrder" type="button" value="Pagar" disabled />
    </div>

    <div id="result" class="result" style="display:none;"></div>

    <script>
      new Cleave('#txtAmount', {
        numeral: true,
        numeralDecimalMark: ',',
        delimiter: '.',
        numeralDecimalScale: 2
      });

      const config = {
        IsEnabled: true,
        IsSandbox: false,
        IsDebug: true
      };

      let userInteracted = false;
      let isProcessing3DS = false;

      // =========================
      // VALIDAÇÃO
      // =========================
      document.querySelectorAll("input").forEach(el => {
        el.addEventListener("input", validarCampos);
      });

      function validarCampos() {
        let valido = true;

        let raw = txtAmount.value.replace(/\./g, '').replace(',', '.');
        let amount = parseFloat(raw);

        if (!amount || amount <= 0) {
          errorAmount.style.display = "block";
          valido = false;
        } else errorAmount.style.display = "none";

        if (!txtCardAlias.value.trim()) {
          errorAlias.style.display = "block";
          valido = false;
        } else errorAlias.style.display = "none";

        if (!txtCardNumber.value.trim()) {
          errorNumber.style.display = "block";
          valido = false;
        } else errorNumber.style.display = "none";

        btnSendOrder.disabled = !valido;
      }

      // =========================
      // EVENTOS 3DS
      // =========================
      Safe2Pay.Mpi.addEventListener("onSuccess", function (response) {
        console.log("3DS SUCCESS:", response);

        isProcessing3DS = false;

        let div = document.getElementById("result");
        div.style.display = "block";

        div.innerHTML = `
          <h3>✅ 3DS Autenticado</h3>
          <p><b>Cavv:</b> ${response.Cavv}</p>
          <p><b>Xid:</b> ${response.Xid || "null"}</p>
          <p><b>Eci:</b> ${response.Eci}</p>
          <p><b>Version:</b> ${response.Version}</p>
          <p><b>ReferenceId:</b> ${response.DirectoryServerTransactionId}</p>
        `;
      });

      Safe2Pay.Mpi.addEventListener("onError", function (err) {
        console.warn("Evento onError recebido:", err);

        // 🔥 ignora durante o fluxo
        if (isProcessing3DS) return;

        // 🔥 ignora antes do clique
        if (!userInteracted) return;

        alert("Erro na autenticação 3DS");
      });

      // =========================
      // CLICK
      // =========================
      btnSendOrder.addEventListener("click", function () {
        userInteracted = true;
        isProcessing3DS = true;

        let raw = txtAmount.value.replace(/\./g, '').replace(',', '.');
        let amount = parseFloat(raw);

        let paymentObject = {
          currency: "BRL",
          totalamount: amount,
          installments: drpInstallments.value,
          cardnumber: txtCardNumber.value,
          cardexpirationmonth: drpCardExpirationMonth.value,
          cardexpirationyear: drpCardExpirationYear.value,
          cardalias: txtCardAlias.value
        };

        Safe2Pay.Mpi.Init(config, amount);

        setTimeout(() => {
          Safe2Pay.Mpi.Checkout(paymentObject);
        }, 400);
      });
    </script>
  </body>
</html>
